name: C Tester

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'problems/c/**'
      - '.github/workflows/c-tester.yml'
  push:
    branches: [ main, develop, problem/* ]
    paths:
      - 'problems/c/**'
      - '.github/workflows/c-tester.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.changes.outputs.projects }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Get changed projects
      id: changes
      run: |
        # Get changed files and extract project directories
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || git ls-tree --name-only -r HEAD)
        PROJECTS=$(echo "$CHANGED_FILES" | grep "^problems/c/" | grep -v ".gitignore" | cut -d'/' -f3 | sort -u | grep -v "^$" || true)
        
        if [ -n "$PROJECTS" ]; then
          echo "Adding projects: $PROJECTS"
          # Convert to JSON array for output
          PROJECTS_JSON=$(echo "$PROJECTS" | jq -R -s -c 'split("\n")[:-1]')
          echo "projects=$PROJECTS_JSON" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT
        else
          echo "No projects to test"
          echo "projects=[]" >> $GITHUB_OUTPUT
          echo "has-changes=false" >> $GITHUB_OUTPUT
        fi

  test_changed_projects:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Install CMake and build tools
      uses: lukka/get-cmake@latest
    
    - name: Test project
      run: |
        echo "Testing ${{ matrix.project }}..."
        cd problems/c/${{ matrix.project }}
        
        # Create build directory
        mkdir -p build
        cd build
        
        # Configure with CMake
        cmake ..
        
        # Build the project
        make
        
        # Run tests
        ctest --verbose
