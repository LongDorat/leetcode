name: C Tester

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'problems/c/**'
      - '.github/workflows/c-tester.yml'
  push:
    branches: [ main, develop, problem/* ]
    paths:
      - 'problems/c/**'
      - '.github/workflows/c-tester.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Install CMake and build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential gcc
    
    - name: Get changed projects
      id: changes
      run: |
        # Get changed files and extract project directories
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || git ls-tree --name-only -r HEAD)
        PROJECTS=$(echo "$CHANGED_FILES" | grep "^problems/c/" | cut -d'/' -f3 | sort -u | grep -v "^$" || true)
        
        if [ -n "$PROJECTS" ]; then
          echo "Testing projects: $PROJECTS"
          echo "$PROJECTS" > projects.txt
        else
          echo "No projects to test"
          touch projects.txt
        fi
    
    - name: Test changed projects
      run: |
        if [ -s projects.txt ]; then
          while read project; do
            echo "Testing $project..."
            cd problems/c/$project
            
            # Create build directory
            mkdir -p build
            cd build
            
            # Configure with CMake
            cmake ..
            
            # Build the project
            make
            
            # Run tests
            ctest --verbose
            
            # Go back to root directory
            cd ../../../..
          done < projects.txt
        else
          echo "No projects changed - skipping tests"
        fi
