name: 00007 Reverse Integer

on:
  push:
    paths:
      - "Problems/00001-00100/00007 Reverse Integer/**"
      - "!**.md"
  pull_request:
    paths:
      - "Problems/00001-00100/00007 Reverse Integer/**"
      - "!**.md"
  workflow_dispatch:

jobs:
  restore-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: "Problems/00001-00100/00007 Reverse Integer"

      - name: Run tests
        run: dotnet test
        working-directory: "Problems/00001-00100/00007 Reverse Integer"
