name: C# Tester

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'problems/csharp/**'
      - '.github/workflows/csharp-tester.yml'
  push:
    branches: [ main, develop, problem/* ]
    paths:
      - 'problems/csharp/**'
      - '.github/workflows/csharp-tester.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.changes.outputs.projects }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Get changed projects
      id: changes
      run: |
        # Get changed files and extract project directories
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD || git ls-tree --name-only -r HEAD)
        PROJECTS=$(echo "$CHANGED_FILES" | grep "^problems/csharp/" | grep -v "\.slnx$" | grep -v ".gitignore" | cut -d'/' -f3 | sort -u | grep -v "^$" || true)
        
        if [ -n "$PROJECTS" ]; then
          echo "Adding projects: $PROJECTS"
          # Convert to JSON array for output
          PROJECTS_JSON=$(echo "$PROJECTS" | jq -R -s -c 'split("\n")[:-1]')
          echo "projects=$PROJECTS_JSON" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT
        else
          echo "No projects to test"
          echo "projects=[]" >> $GITHUB_OUTPUT
          echo "has-changes=false" >> $GITHUB_OUTPUT
        fi

  test_changed_projects:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-changes.outputs.projects) }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Test project
      run: |
        echo "Testing ${{ matrix.project }}..."
        dotnet test problems/csharp/${{ matrix.project }}/*.csproj --verbosity normal
